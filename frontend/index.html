<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPGC Assistant - Premium Prototype v2</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="dark-mode">
    <div class="widget-container">
        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="header-left">
                    <div class="branding">
                        <div class="avatar-container">
                            <img src="assets/clg_logo.png" alt="Bot" class="header-avatar">
                            <span class="status-dot"></span>
                        </div>
                        <div class="branding-text">
                            <h1 class="logo-text">NPGC Assistant</h1>
                            <span class="status-text">Online</span>
                        </div>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="action-btn lang-btn" id="lang-switch" title="Switch Language">
                        <span class="icon">EN / हिंदी</span>
                    </button>
                    <button class="action-btn" id="tts-toggle" title="Auto-speak Toggle">
                        <span class="icon">🔇</span>
                    </button>
                    <button class="action-btn clear-btn" id="clear-chat" title="Clear Chat History">
                        <span class="icon">🗑️</span>
                    </button>
                </div>

            </header>

            <div class="chat-messages" id="chat-messages">
                <!-- Messages will appear here -->
            </div>

            <footer class="chat-input-area">
                <div id="autocomplete-list" class="autocomplete-dropdown"></div>
                <form id="chat-form" class="input-wrapper">
                    <button type="button" class="voice-btn" id="voice-trigger" title="Voice Search">
                        <span class="icon">🎤</span>
                    </button>
                    <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
                    <button type="submit" class="send-btn">
                        <span class="icon">Send</span>
                    </button>
                </form>
            </footer>
        </main>
    </div>
    <script src="script.js?v=10"></script>
</body>
</html>
